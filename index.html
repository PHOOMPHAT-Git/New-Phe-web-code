<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[ New ] Phe Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #fff;
      line-height: 1.6;
      background: radial-gradient(circle, #179fc9 -125%, #000000 100%);
      user-select: none;
      transition: background 5s ease-in-out;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #fff;
      font-size: 16px;
      transition: color 0.3s ease;
      box-shadow: 0 0 15px rgb(0, 0, 0);
      border-radius: 10px;
      box-sizing: border-box;
      background-color: rgba(255, 255, 255, 0.025);
      padding: 8px;
    }

    .nav a:hover {
      color: #179fc9;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
      border-radius: 8px;
      margin: 20px 0;
      background-color: rgba(255, 255, 255, 0.025);
      box-shadow: 0 0 15px rgb(0, 0, 0);
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 10px 20px;
      font-size: 16px;
      background: #179fc9;
      color: #121212;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background: #ffffff;
    }

    .features {
      padding: 50px 20px;
    }

    .features h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 28px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-left: 40px;
    }

    .feature-card {
      position: relative;
      background: #1f1f1f;
      padding: 20px;
      border-radius: 8px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      overflow: hidden;
      z-index: 1;
      max-width: 320px;
      margin: top;
      box-shadow: 0 0 15px rgb(0, 0, 0);
      background-color: rgba(255, 255, 255, 0.025);
    }

    .feature-card::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0;
      background: linear-gradient(to bottom, #179fc900, #000000);
      transition: height 0.3s ease-in-out;
      border-radius: 8px;
    }

    .feature-card:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }

    .feature-card:hover::after {
      height: 100%;
    }

    .feature-card h3 {
      font-size: 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    .feature-card p {
      font-size: 16px;
      color: #ccc;
    }

    .feature-card img {
      display: block;
      margin: 0 auto;
      width: 100%;
      max-width: 300px;
      margin-top: 25px;
      border-radius: 10px;
    }

    .hidden-image {
      position: absolute;
      bottom: -100%;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      border-radius: 10px;
      transition: bottom 0.3s ease;
      z-index: 2;
      cursor: pointer;
    }

    .hidden-text {
      margin-top: 10px;
      text-align: center;
      font-size: 16px;
      color: #ccc;
      transition: opacity 0.3s ease;
    }

    .feature-card:hover .hidden-image {
      bottom: 20px;
    }

    footer {
      text-align: center;
      padding: 20px 0;
      margin-top: 40px;
      background: #1f1f1f;
      border-top: 1px solid #333;
    }

    footer p {
      font-size: 14px;
      color: #bbb;
    }

    footer a {
      color: #179fc9;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: transparent;
      border: 8px solid rgba(23, 159, 201, 0.8);
      transform: scale(0);
      animation: expandFade 0.5s ease-out forwards;
      pointer-events: none;
    }

    @keyframes expandFade {
      to {
        transform: scale(2);
        opacity: 0;
      }
    }

    ::-webkit-scrollbar {
      width: 2.5px;
    }

    ::-webkit-scrollbar-track {
      background: #000000;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(to bottom, #000000, #179fc9, #000000);
      transition: background-color 0.3s;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(to bottom, #000000, #179fc9, #000000);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0);
      justify-content: center;
      align-items: center;
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s ease-in-out, background-color 0.5s ease-in-out;
      animation: backgroundFade 1s forwards;
    }

    .modal.show {
      display: flex;
      opacity: 1;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal.fadeOut {
      opacity: 0;
      background-color: rgba(0, 0, 0, 0);
    }

    @keyframes backgroundFade {
      0% {
        background-color: rgba(0, 0, 0, 0);
      }
      100% {
        background-color: rgba(0, 0, 0, 0.5);
      }
    }

    .modal-content {
      background-color: #333;
      padding: 20px;
      border-radius: 8px;
      width: 80%;
      max-width: 500px;
      color: #fff;
      text-align: center;
      box-shadow: 0 0 15px rgb(0, 0, 0);
      transform: translateY(-50px);
      opacity: 0;
      transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
      animation: modalContentAppear 0.5s ease-out forwards;
    }

    @keyframes modalContentAppear {
      0% {
        transform: translateY(0px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media screen and (max-width: 600px) {
      .nav a {
        margin-left: 20px;
        text-decoration: none;
        color: #fff;
        font-size: 14px;
        transition: color 0.3s ease;
        box-shadow: 0 0 15px rgb(0, 0, 0);
        border-radius: 10px;
        box-sizing: border-box;
        background-color: rgba(255, 255, 255, 0.025);
        padding: 8px;
      }

      .hero h2 {
        font-size: 20px;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">PHE Website</h1>
      <nav class="nav">
        <a href="https://discord.com" target="_blank">Dicord</a>
        <a href="https://www.tiktok.com" target="_blank">Tiktok</a>
      </nav>
    </header>    
    
    <section class="hero">
      <h2>Welcome to Phe website</h2>
      <p>[ เข้าดิสคอร์ดกันด้วยนะ ! ]</p>
    </section>
    
    <section id="features" class="features">
      <h2>Roblox Username !</h2>
      <div class="feature-grid">
        <div class="feature-card">
          <h3>User 1</h3>
          <img src="https://github.com/Sylraz-X/Pictures/blob/main/PHE%20New%20LOGO.png?raw=true" alt="Main Image">
          <p class="hidden-text">Tiktok : User 1</p>
          <img class="hidden-image" src="https://via.placeholder.com/300" alt="Additional Image" data-name="User 1" data-title="">
          <p class="hidden-text">Followers : User 1</p>
        </div>
        <div class="feature-card">
          <h3>User 1</h3>
          <img src="https://github.com/Sylraz-X/Pictures/blob/main/PHE%20New%20LOGO.png?raw=true" alt="Main Image">
          <p class="hidden-text">Tiktok : User 1</p>
          <img class="hidden-image" src="https://via.placeholder.com/300" alt="Additional Image" data-name="User 1" data-title="">
          <p class="hidden-text">Followers : User 1</p>
        </div>
        <div class="feature-card">
          <h3>User 1</h3>
          <img src="https://github.com/Sylraz-X/Pictures/blob/main/PHE%20New%20LOGO.png?raw=true" alt="Main Image">
          <p class="hidden-text">Tiktok : User 1</p>
          <img class="hidden-image" src="https://via.placeholder.com/300" alt="Additional Image" data-name="User 1" data-title="">
          <p class="hidden-text">Followers : User 1</p>
        </div>
      </div>
    </section>
  </div>

  <div id="myModal" class="modal">
    <div class="modal-content">
      <h2 id="modal-title">Modal Title</h2>
      <p id="modal-content">Some content here</p>
    </div>
  </div>

  <script>
    const modal = document.getElementById("myModal");
    const hiddenImages = document.querySelectorAll(".hidden-image");
    
    hiddenImages.forEach(image => {
      image.addEventListener("click", function() {
        const name = this.dataset.name;
        const title = this.dataset.title;
        document.getElementById("modal-title").textContent = name;
        document.getElementById("modal-content").textContent = title;
        modal.classList.add("show");
      });
    });

    window.addEventListener("click", function(event) {
      if (event.target === modal) {
        modal.classList.add("fadeOut");
        setTimeout(() => {
          modal.classList.remove("show", "fadeOut");
        }, 500);
      }
    });
  </script>
</body>
</html>
